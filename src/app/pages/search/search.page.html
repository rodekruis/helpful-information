<div class="floating-action-area is_in-page layout--float-end ion-margin-start">
  <a
    [routerLink]="['../']"
    [queryParams]="{ q: null }"
    queryParamsHandling="merge"
    [attr.title]="regionData?.labelBackButton"
    [attr.aria-label]="regionData?.labelBackButton"
    class="action is_round text-style--center"
  >
    <strong aria-hidden="true">&times;</strong>
  </a>
</div>

<h2 class="ion-no-margin text-style--header text-style--size-2">
  <ng-container *ngIf="!useSearchApi">
    {{ regionData?.labelSearchPageTitle }}
  </ng-container>
  <ng-container *ngIf="!!useSearchApi">
    What are you looking for?
  </ng-container>
</h2>

<p *ngIf="!!useSearchApi">Search by typing a question or relevant keywords.</p>

<app-search-input
  [(searchQuery)]="searchQuery"
  (doSearch)="onSearchInput($event)"
  [actionLabel]="regionData?.labelSearchAction"
  class="ion-margin-vertical"
></app-search-input>

<section
  *ngIf="!!searchQuery"
  id="search-results"
  [tabindex]="-1"
  class="focus--minimal focus--fade-out"
>
  <div
    class="ion-padding"
    style="border: 1px solid white; border-radius: 0.25em"
  >
    <div *ngIf="useSearchApi && loadingSearch">
      <span
        class="loading-text"
        style="width: 95%"
      ></span>
      <span class="loading-text"></span>
      <span
        class="loading-text"
        style="width: 88%"
      ></span>
      <span
        class="loading-text"
        style="width: 75%"
      ></span>
    </div>

    <div
      *ngIf="useSearchApi && !!searchQuery && searchResultSummary && !loadingSearch"
      markdown
      [data]="searchResultSummary"
      [inline]="false"
    ></div>
  </div>

  <p *ngIf="!!searchQuery && !loadingSearch && searchResults?.length">
    For more detailed information, check out these FAQs:
  </p>

  <app-q-a-set-list
    *ngIf="!!searchQuery && !loadingSearch"
    [baseUrl]="'../'"
    [list]="searchResults"
    [showDateUpdatedOutsideQuestion]="false"
    class="ion-margin-vertical"
  ></app-q-a-set-list>
</section>
